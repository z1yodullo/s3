<!doctype html>
<html lang="en">
  <head>

    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css" />

  <body class="font-[Montserrat ] bg-[#252B42] -z-1 text-white">
    <img class="hidden lg:flex lg:absolute" src="background.png" alt="" />
    <header class="text-white p-[20px]">
      <div class="max-w-[1200px] m-auto flex justify-between">
        <div class="flex gap-[140px] items-center">
          <h1 class="text-[24px] font-bold">BrandName</h1>

            <p>Product</p>

            <p>Contact</p>
          </nav>
          <div class="flex lg:hidden items-center gap-[20px]">
            <img src="icn search .icn-xs.png" alt="" />

    <section class="max-w-[1200px] m-auto flex flex-col lg:flex-row justify-between items-center">

        <p class="py-[20px]">
          We know how large objects will act, <br />

        </p>
        <div class="flex flex-col lg:flex-row items-center gap-[10px]">
            <button class="py-[10px] px-[20px] bg-[#23A6F0] text-white rounded-[50px]">Get Quote Now</button>
            <button class="py-[10px] px-[20px] bg-[#252B42] text-white rounded-[50px] border">Learn More</button>
        </div>
      </aside>
      <img src="col-md-6.png " class="z-1" alt="" />
